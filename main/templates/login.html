<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Financial & Inventory Management System</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{

    width:100%;
    max-width:400px;

    background:#ffffff;

    padding:35px;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,.10);

}

.login-card h2{

    text-align:center;

    color:#2563eb;

    font-size:28px;

    margin-bottom:25px;

}

form{

    display:flex;

    flex-direction:column;

}

select,
input{

    width:100%;

    height:45px;

    padding:0 14px;

    margin-bottom:16px;

    border:1px solid #d1d5db;

    border-radius:8px;

    font-size:15px;

    outline:none;

    transition:.3s;

}

select:focus,
input:focus{

    border-color:#2563eb;

    box-shadow:0 0 5px rgba(37,99,235,.2);

}

.remember{

    display:flex;

    align-items:center;

    gap:10px;

    margin-bottom:18px;

    font-size:14px;

    color:#555;

}

.remember input{

    width:16px;

    height:16px;

    margin:0;

}

button{

    width:100%;

    height:46px;

    border:none;

    border-radius:8px;

    background:#2563eb;

    color:#ffffff;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#1d4ed8;

}

.links{

    text-align:center;

    margin-top:20px;

    font-size:14px;

}

.links a{

    text-decoration:none;

    color:#2563eb;

    font-weight:600;

}

.links a:hover{

    text-decoration:underline;

}

#strength{

    font-size:13px;

    color:#ef4444;

    margin-bottom:10px;

}

@media(max-width:480px){

.login-card{

padding:25px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="login-card">

<h2>Login</h2>

<form id="loginForm" method="POST" action="/login">

<select name="role" required>
<option value="User">User</option>
<option value="Business">Business</option>
</select>

<input
type="email"
name="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
name="password"
id="password"
placeholder="Password"
required>

<div id="strength"></div>

<div class="remember">

<input
type="checkbox"
id="remember"
name="remember">

<label for="remember">Remember me</label>

</div>

<button type="submit">Login</button>

</form>

<div class="links">

<a href="/register">Create Account</a>

&nbsp; | &nbsp;

<a href="/forgot">Forgot Password?</a>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

const password=document.getElementById("password").value;

if(password.length<6){

e.preventDefault();

alert("Password must be at least 6 characters long.");

}

});

</script>

</body>
</html>
